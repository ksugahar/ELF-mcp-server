name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish-boundary gate (block private/commercial leakage)
        run: |
          echo "Scanning packaged sources for publish-boundary violations..."
          # case-sensitive (TOSCA word-bounded so vendor "AutoScale" doesn't trip it)
          PATTERN='_crossval|work_examples_dump|\bTOSCA\b|FEMM\+\+|vs\.? (FEMM|COMSOL|JMAG)|W:[\\/]00_CAE|G:[\\/]2014'
          if grep -rnE "$PATTERN" src/elf_mcp_server README.md pyproject.toml ; then
            echo "::error::Publish-boundary violation detected above (private crossval / removed work corpus / commercial-tool provenance / private drive path). Aborting publish."
            exit 1
          fi
          echo "Publish-boundary gate passed."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI (Trusted Publisher)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/elf-mcp-server
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
